# General settings
general {
    disable_loading_bar = false
    grace = 0
    hide_cursor = true
}

# Background layer
background {
    monitor = eDP-1
    path = screenshot
    color = rgb(1e1e2e)
    blur_passes = 3
    blur_size = 8
}

# Input layer
input-field {
    size = 250, 60
    position = 0, 0
    halign = center
    valign = center
    monospace = true
    shadow_passes = 2
    rounding = 8
    color_inner = rgb(fafafa)
    color_outer = rgb(b4befe)
    font_family = JetBrains Mono Nerd Font
    font_size = 16

    # Placeholder text
    fail_text = <i>$FAIL</i>
    fail_timeout = 2000
    fail_transition = 300
    capslock_indicator = true

    # Hide symbol after entering password
    check_password_on_fail = true
    clear_passwd_button = false
}

# Optional: Time display
label {
    monitor = eDP-1
    text = cmd[update:1000] date +%I:%M%p
    position = 0, 120
    halign = center
    valign = center
    font_size = 80
    font_family = Sans Serif
    rounding = 0
}
